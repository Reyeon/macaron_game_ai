<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>뚱카롱 메이커 - 한붓그리기 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #fce4ec;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* 모바일 스크롤 방지 */
        }

        .game-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #fff9fb, #ffebee);
            position: relative;
        }

        /* 상단 게임 방법 가이드 영역 */
        .guide-header {
            padding: 10px;
            background: #f8bbd0;
            border-bottom: 4px solid #f48fb1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .guide-title {
            font-size: 0.75rem;
            color: #ad1457;
            background: rgba(255,255,255,0.5);
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .recipe-flow {
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            padding: 6px 12px;
            border-radius: 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .recipe-step {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }

        .recipe-arrow {
            font-size: 0.8rem;
            color: #f48fb1;
        }

        .stats-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 5px 15px;
            font-size: 0.9rem;
            color: #ad1457;
        }

        .main-area {
            flex: 1;
            display: flex;
            padding: 10px;
            gap: 10px;
        }

        .board-container {
            flex: 3;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            position: relative;
        }

        .ingredient-shelf {
            flex: 1;
            background: #efe0d5;
            border: 4px solid #d7ccc8;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 5px;
            gap: 15px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            position: relative;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.05);
        }

        .cell.selected {
            background: #fce4ec;
            transform: scale(0.9);
            border: 3px solid #f06292;
        }

        .ingredient-item {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 0 #d7ccc8;
        }

        .target-count {
            font-size: 0.8rem;
            background: #f06292;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: -10px;
            min-width: 40px;
            text-align: center;
        }

        .line-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .footer {
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            background: #f8bbd0;
        }

        .btn {
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 #f48fb1;
            cursor: pointer;
            user-select: none;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #f48fb1;
        }

        /* 아이템 이모지 설정 */
        .type-shell::after { content: '🧁'; }
        .type-filling::after { content: '🍯'; }
        .type-topping::after { content: '🍓'; }

        .combo-text {
            position: absolute;
            color: #e91e63;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
            text-shadow: 1px 1px 0 white;
        }

        @keyframes floatUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="guide-header">
        <div class="guide-title">만드는 순서대로 연결하세요!</div>
        <div class="recipe-flow">
            <div class="recipe-step">🧁</div>
            <div class="recipe-arrow">▶</div>
            <div class="recipe-step">🍯<span class="text-[10px] ml-1">(여러개 가능)</span></div>
            <div class="recipe-arrow">▶</div>
            <div class="recipe-step">🧁</div>
            <div class="recipe-arrow">▶</div>
            <div class="recipe-step">🍓</div>
        </div>
        <div class="stats-bar">
            <span>SCORE: <span id="score">0</span></span>
            <span>MOVES: <span id="moves">20</span></span>
        </div>
        <div class="w-[90%] bg-white rounded-full h-3 border border-pink-300">
            <div id="progress-bar" class="bg-green-400 h-full rounded-full transition-all" style="width: 0%"></div>
        </div>
    </div>

    <div class="main-area">
        <!-- 메인 게임 보드 -->
        <div class="board-container" id="board">
            <canvas id="canvas" class="line-canvas"></canvas>
        </div>

        <!-- 오른쪽 목표 수집 칸 -->
        <div class="ingredient-shelf">
            <div class="text-[10px] font-bold text-gray-600 mb-1">GOAL</div>
            <div class="flex flex-col items-center gap-4">
                <div class="flex flex-col items-center">
                    <div class="ingredient-item type-shell"></div>
                    <div class="target-count" id="target-shell">0/15</div>
                </div>
                <div class="flex flex-col items-center">
                    <div class="ingredient-item type-filling"></div>
                    <div class="target-count" id="target-filling">0/50</div>
                </div>
                <div class="flex flex-col items-center">
                    <div class="ingredient-item type-topping"></div>
                    <div class="target-count" id="target-topping">0/5</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="btn" id="cancel-btn">취소</div>
        <div class="btn" id="shuffle-btn">셔플</div>
    </div>
</div>

<script>
    /**
     * 게임 설정 및 로직
     */
    const ROWS = 6;
    const COLS = 5;
    const TYPES = ['shell', 'filling', 'topping'];
    
    let board = [];
    let selection = [];
    let score = 0;
    let moves = 20;
    let targets = { shell: 0, filling: 0, topping: 0 };
    let goal = { shell: 15, filling: 50, topping: 5 };

    const boardEl = document.getElementById('board');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 게임 시작 초기화
    function initGame() {
        createBoard();
        renderBoard();
        updateUI();
        resizeCanvas();
        
        document.getElementById('cancel-btn').onclick = resetSelection;
        document.getElementById('shuffle-btn').onclick = shuffleBoard;
    }

    // 데이터 보드 생성
    function createBoard() {
        board = [];
        for (let r = 0; r < ROWS; r++) {
            let row = [];
            for (let c = 0; c < COLS; c++) {
                row.push(getRandomType());
            }
            board.push(row);
        }
    }

    function getRandomType() {
        return TYPES[Math.floor(Math.random() * TYPES.length)];
    }

    // 화면에 보드 그리기
    function renderBoard() {
        const cells = boardEl.querySelectorAll('.cell');
        cells.forEach(c => c.remove());

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = `cell type-${board[r][c]}`;
                cell.dataset.r = r;
                cell.dataset.c = c;
                
                // 마우스 이벤트
                cell.addEventListener('mousedown', () => startSelection(r, c));
                cell.addEventListener('mouseenter', () => continueSelection(r, c));
                // 터치 이벤트
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startSelection(r, c);
                });
                
                boardEl.appendChild(cell);
            }
        }
    }

    // 터치 이동 감지
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        if (element && element.classList.contains('cell')) {
            const r = parseInt(element.dataset.r);
            const c = parseInt(element.dataset.c);
            continueSelection(r, c);
        }
    }, { passive: false });

    document.addEventListener('mouseup', endSelection);
    document.addEventListener('touchend', endSelection);

    let isSelecting = false;

    // 그리기 시작
    function startSelection(r, c) {
        if (moves <= 0) return;
        if (board[r][c] !== 'shell') return; // 반드시 꼬끄(🧁)부터 시작
        
        isSelecting = true;
        selection = [{r, c, type: 'shell'}];
        updateSelectionUI();
    }

    // 그리는 중
    function continueSelection(r, c) {
        if (!isSelecting) return;
        
        const last = selection[selection.length - 1];
        if (last.r === r && last.c === c) return;

        // 인접한 칸인지 확인
        const dist = Math.abs(last.r - r) + Math.abs(last.c - c);
        if (dist !== 1) return;

        // 되돌아가기 기능
        const existingIdx = selection.findIndex(s => s.r === r && s.c === c);
        if (existingIdx !== -1) {
            if (existingIdx === selection.length - 2) {
                selection.pop();
            }
            updateSelectionUI();
            return;
        }

        const currentType = board[r][c];
        const pathTypes = selection.map(s => s.type);
        const hasSecondShell = pathTypes.filter(t => t === 'shell').length === 2;
        const lastType = last.type;

        let canAdd = false;

        // 한붓그리기 로직 규칙 적용
        if (!hasSecondShell) {
            if (lastType === 'shell') {
                if (currentType === 'filling') canAdd = true;
            } else if (lastType === 'filling') {
                if (currentType === 'filling' || currentType === 'shell') canAdd = true;
            }
        } else {
            // 두 번째 꼬끄가 놓였다면 마지막은 반드시 토핑(🍓)
            if (lastType === 'shell' && currentType === 'topping') canAdd = true;
        }

        if (canAdd) {
            selection.push({r, c, type: currentType});
            updateSelectionUI();
        }
    }

    function updateSelectionUI() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => cell.classList.remove('selected'));
        
        selection.forEach(s => {
            const el = document.querySelector(`.cell[data-r="${s.r}"][data-c="${s.c}"]`);
            if (el) el.classList.add('selected');
        });

        drawLine();
    }

    // 그리기 종료 및 결과 판정
    function endSelection() {
        if (!isSelecting) return;
        isSelecting = false;

        const pathTypes = selection.map(s => s.type);
        const shellCount = pathTypes.filter(t => t === 'shell').length;
        const hasFilling = pathTypes.includes('filling');
        const hasTopping = pathTypes.includes('topping');

        // 완성 조건 만족 시
        if (shellCount === 2 && hasFilling && hasTopping) {
            processMatch();
        } else {
            resetSelection();
        }
    }

    function processMatch() {
        const count = selection.length;
        score += count * 10;
        moves--;

        selection.forEach(s => {
            targets[s.type]++;
            board[s.r][s.c] = getRandomType();
        });

        const last = selection[selection.length - 1];
        showFloatingText(`뚱카롱 완성! +${count*10}`, last.r, last.c);

        resetSelection();
        renderBoard();
        updateUI();
        checkGameOver();
    }

    function resetSelection() {
        selection = [];
        updateSelectionUI();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function showFloatingText(text, r, c) {
        const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
        if (!cell) return;
        const rect = cell.getBoundingClientRect();
        const floating = document.createElement('div');
        floating.className = 'combo-text';
        floating.innerText = text;
        floating.style.left = `${rect.left}px`;
        floating.style.top = `${rect.top}px`;
        document.body.appendChild(floating);
        setTimeout(() => floating.remove(), 800);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('moves').innerText = moves;
        
        document.getElementById('target-shell').innerText = `${Math.min(targets.shell, goal.shell)}/${goal.shell}`;
        document.getElementById('target-filling').innerText = `${Math.min(targets.filling, goal.filling)}/${goal.filling}`;
        document.getElementById('target-topping').innerText = `${Math.min(targets.topping, goal.topping)}/${goal.topping}`;

        const totalGoal = goal.shell + goal.filling + goal.topping;
        const currentProgress = Math.min(targets.shell, goal.shell) + Math.min(targets.filling, goal.filling) + Math.min(targets.topping, goal.topping);
        const percent = (currentProgress / totalGoal) * 100;
        document.getElementById('progress-bar').style.width = `${percent}%`;
    }

    function checkGameOver() {
        const cleared = targets.shell >= goal.shell && targets.filling >= goal.filling && targets.topping >= goal.topping;
        if (cleared) {
            setTimeout(() => {
                alert(`대단해요! 모든 뚱카롱 주문을 완료했습니다!\n최종 점수: ${score}`);
                location.reload();
            }, 500);
        } else if (moves <= 0) {
            setTimeout(() => {
                alert(`재료가 모두 떨어졌어요!\n최종 점수: ${score}`);
                location.reload();
            }, 500);
        }
    }

    function shuffleBoard() {
        if (moves < 2) {
            alert('셔플하려면 이동 횟수 2회가 필요합니다.');
            return;
        }
        moves -= 2;
        createBoard();
        renderBoard();
        updateUI();
    }

    function drawLine() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (selection.length < 2) return;

        ctx.beginPath();
        ctx.strokeStyle = '#f06292';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        selection.forEach((s, idx) => {
            const el = document.querySelector(`.cell[data-r="${s.r}"][data-c="${s.c}"]`);
            const rect = el.getBoundingClientRect();
            const containerRect = boardEl.getBoundingClientRect();
            const x = rect.left - containerRect.left + rect.width / 2;
            const y = rect.top - containerRect.top + rect.height / 2;

            if (idx === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function resizeCanvas() {
        canvas.width = boardEl.clientWidth;
        canvas.height = boardEl.clientHeight;
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        renderBoard();
    });

    window.onload = initGame;
</script>

</body>
</html>
